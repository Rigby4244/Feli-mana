# Example Render service manifest. Update names and regions as needed.
services:
  - type: web
    name: mern-backend
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
